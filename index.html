<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      .rain-drop {
        position: absolute;
        width: 2px;
        height: 20px;
        background: rgba(255, 255, 255, 0.5);
        animation: fall linear infinite;
      }

      @keyframes fall {
        0% {
          transform: translateY(-100px);
          opacity: 0;
        }
        100% {
          transform: translateY(100vh);
          opacity: 1;
        }
      }

      #sunGlow {
        background: radial-gradient(
          circle,
          rgba(244, 215, 28, 0.8),
          rgba(255, 223, 0, 0)
        );
        filter: blur(40px);
        animation: pulse 3s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
      }

      .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50px;
        filter: blur(10px);
        opacity: 0.6;
        animation: moveCloud linear infinite;
      }

      @keyframes moveCloud {
        0% {
          transform: translateX(-200px);
        }
        100% {
          transform: translateX(100vw);
        }
      }

      .glass {
        background: rgba(122, 119, 119, 0.15);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        border: 1px solid rgba(255, 247, 247, 0.571);
      }

      .glow {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .animate-gradient {
        background-size: 300% 300%;
        animation: gradientMove 10s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#667eea] via-[#764ba2] to-[#6dd5ed] animate-gradient text-black"
  >
    <!-- 🌧️ Rain -->
    <div
      id="rainContainer"
      class="fixed inset-0 pointer-events-none hidden z-0"
    ></div>

    <!-- 🌤️ Sun -->
    <div
      id="sunGlow"
      class="hidden fixed top-10 right-10 w-40 h-40 rounded-full z-0"
    ></div>

    <!-- Cloudy -->
    <div
      id="cloudContainer"
      class="fixed inset-0 pointer-events-none hidden z-0"
    ></div>

    <!-- ✅ MAIN CONTENT -->
    <div class="relative z-10 max-w-6xl mx-auto p-6">
      <h1 class="text-4xl font-bold mb-6 text-center drop-shadow-lg">
        🌤️ Weather Dashboard
      </h1>

      <!-- Search -->
      <div class="flex flex-col sm:flex-row gap-3 mb-4">
        <input
          id="searchInput"
          type="text"
          placeholder="Search city..."
          class="flex-1 p-3 rounded-xl bg-white/20 text-white placeholder-white/70 backdrop-blur-lg outline-none focus:ring-2 focus:ring-white"
        />

        <button
          onclick="handleSearch()"
          class="px-5 py-3 rounded-xl bg-white text-black font-semibold hover:scale-105 transition"
        >
          Search
        </button>

        <button
          onclick="getCurrentLocation()"
          class="px-5 py-3 rounded-xl bg-white/20 hover:bg-white/30 transition"
        >
          📍Use Current Location
        </button>
      </div>

      <!-- Dropdown -->
      <select
        id="recentCities"
        onchange="selectCity()"
        class="p-4 rounded-lg bg-blue-500/70 mt-3"
      >
        <option value="">Recent Searches</option>
      </select>

      <!-- Error -->
      <p id="errorMsg" class="text-red-500 mt-2 hidden"></p>

      <!-- Weather Card -->
      <div class="glass glow p-8 mt-6">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-6"
        >
          <!-- Left -->
          <div>
            <h2 id="cityName" class="text-3xl font-semibold">--</h2>

            <p id="temperature" class="text-6xl font-bold my-2 tracking-wide">
              --°C
            </p>
            <button
              onclick="toggleTemp()"
              class="mt-2 px-3 py-1 bg-white/30 rounded-lg text-sm"
            >
              °C / °F
            </button>

            <p id="condition" class="text-white/80 text-lg">--</p>
          </div>

          <!-- Right -->
          <div class="grid grid-cols-2 gap-6 text-center text-white/90">
            <div>
              <p class="text-green-200">Humidity</p>
              <p id="humidity">--</p>
            </div>

            <div>
              <p class="text-green-200">Wind</p>
              <p id="wind">--</p>
            </div>

            <div>
              <p class="text-green-200">Feels Like</p>
              <p id="feelsLike">--</p>
            </div>

            <div>
              <p class="text-green-200">Pressure</p>
              <p id="pressure">--</p>
            </div>
          </div>
        </div>

        <!-- Forecast -->
        <h2 class="text-xl mt-6 mb-4">5-Day Forecast</h2>

        <div
          id="forecastContainer"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"
        ></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
