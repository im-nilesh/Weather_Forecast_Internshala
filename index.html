<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      .glass {
        background: rgba(122, 119, 119, 0.15);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        border: 1px solid rgba(255, 247, 247, 0.571);
      }

      .glow {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .animate-gradient {
        background-size: 300% 300%;
        animation: gradientMove 10s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#667eea] via-[#764ba2] to-[#6dd5ed] animate-gradient text-black"
  >
    <div class="w-full max-w-5xl p-6">
      <h1 class="text-4xl font-bold mb-6 text-center drop-shadow-lg">
        🌤️ Weather Dashboard
      </h1>
      <!-- Search -->
      <div class="flex flex-col sm:flex-row gap-3 mb-4">
        <input
          id="searchInput"
          type="text"
          placeholder="Search city..."
          class="flex-1 p-3 rounded-xl bg-white/20 text-white placeholder-white/70 backdrop-blur-lg outline-none focus:ring-2 focus:ring-white"
        />

        <button
          onclick="handleSearch()"
          class="px-5 py-3 rounded-xl bg-white text-black font-semibold hover:scale-105 transition"
        >
          Search
        </button>

        <button
          onclick="getCurrentLocation()"
          class="px-5 py-3 rounded-xl bg-white/20 hover:bg-white/30 transition"
        >
          📍Use Current Location
        </button>
      </div>

      <!-- Dropdown -->
      <select
        id="recentCities"
        onchange="selectCity()"
        class="p-4 rounded-lg bg-blue-500/70 mt-3"
      >
        <option value="">Recent Searches</option>
      </select>

      <!-- Error -->
      <p id="errorMsg" class="text-red-500 mt-2 hidden"></p>

      <!-- Weather Card -->
      <div class="bg-blue-300/70 rounded-2xl p-6 shadow-lg mt-6">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-6"
        >
          <!-- Left -->
          <div>
            <h2 id="cityName" class="text-2xl font-semibold">--</h2>
            <p id="temperature" class="text-5xl font-bold my-2">--°C</p>
            <p id="condition" class="text-black-600">--</p>
          </div>

          <!-- Right -->
          <div class="grid grid-cols-2 gap-4 text-center">
            <div>
              <p class="text-green-200">Humidity</p>
              <p id="humidity">--</p>
            </div>

            <div>
              <p class="text-green-200">Wind</p>
              <p id="wind">--</p>
            </div>

            <div>
              <p class="text-green-200">Feels Like</p>
              <p id="feelsLike">--</p>
            </div>

            <div>
              <p class="text-green-200">Pressure</p>
              <p id="pressure">--</p>
            </div>
          </div>
        </div>

        <!-- Forecast -->
        <h2 class="text-xl mt-6 mb-4">5-Day Forecast</h2>

        <div
          id="forecastContainer"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"
        ></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
