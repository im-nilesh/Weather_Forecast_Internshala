<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="text-gray-800 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
      <h1 class="text-3xl font-semibold mb-6">Weather Dashboard 🌤️</h1>

      <!-- Search -->
      <div class="flex flex-col sm:flex-row gap-3">
        <input
          id="searchInput"
          type="text"
          placeholder="Search city..."
          class="flex-1 p-3 rounded-xl bg-white/70 backdrop-blur-lg shadow-md"
        />

        <button
          onclick="handleSearch()"
          class="px-5 py-3 rounded-xl text-white bg-gradient-to-r from-[#4facfe] to-[#00f2fe]"
        >
          Search
        </button>

        <button
          onclick="getCurrentLocation()"
          class="px-5 py-3 rounded-xl bg-white/70 shadow-md"
        >
          📍 Location
        </button>
      </div>

      <!-- Dropdown -->
      <select
        id="recentCities"
        onchange="selectCity()"
        class="p-2 rounded-lg bg-white/70 mt-3"
      >
        <option value="">Recent Searches</option>
      </select>

      <!-- Error -->
      <p id="errorMsg" class="text-red-500 mt-2 hidden"></p>

      <!-- Weather Card -->
      <div class="bg-white/70 rounded-2xl p-6 shadow-lg mt-6">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-6"
        >
          <!-- Left -->
          <div>
            <h2 id="cityName" class="text-2xl font-semibold">--</h2>
            <p id="temperature" class="text-5xl font-bold my-2">--°C</p>
            <p id="condition" class="text-gray-600">--</p>
          </div>

          <!-- Right -->
          <div class="grid grid-cols-2 gap-4 text-center">
            <div>
              <p class="text-gray-400">Humidity</p>
              <p id="humidity">--</p>
            </div>

            <div>
              <p class="text-gray-400">Wind</p>
              <p id="wind">--</p>
            </div>

            <div>
              <p class="text-gray-400">Feels Like</p>
              <p id="feelsLike">--</p>
            </div>

            <div>
              <p class="text-gray-400">Pressure</p>
              <p id="pressure">--</p>
            </div>
          </div>
        </div>

        <!-- Forecast -->
        <h2 class="text-xl mt-6 mb-4">5-Day Forecast</h2>

        <div
          id="forecastContainer"
          class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"
        ></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
